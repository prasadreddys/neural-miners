<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neural Miner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-layer"></div>
  <canvas id="particles" aria-hidden="true"></canvas>

  <div class="glass-shell">
    <header class="panel header">
      <div>
        <h1>Neural Miner</h1>
        <p>AI-powered crypto metaverse</p>
      </div>
      <span id="connectionStatus" class="status disconnected">Disconnected</span>
    </header>

    <section class="panel metrics">
      <div class="stat-card" id="energyCard"><span>Energy</span><strong id="energyValue">99</strong></div>
      <div class="stat-card" id="tokenCard"><span>Tokens</span><strong id="tokenValue">0</strong></div>
      <div class="stat-card" id="streakCard"><span>Streak</span><strong id="streakValue">0</strong></div>
    </section>

    <section class="panel mine-area">
      <button id="tapMineBtn" class="primary-btn">Tap + Mine</button>
      <small>Tap to start extracting digital energy.</small>
    </section>

    <section class="panel actions-grid">
      <button class="secondary-btn" id="missionsBtn">AI Missions</button>
      <button class="secondary-btn" id="offlineBtn">Claim Offline Energy</button>
      <button class="secondary-btn" id="leaderboardBtn">Leaderboard</button>
      <button class="secondary-btn" id="connectBtn">Connect Wallet</button>
      <button class="secondary-btn" id="balanceBtn">Check $NMT Balance</button>
    </section>

    <section class="panel" style="margin-top:10px;">
      <div id="assistant-text" style="padding:10px; border-radius:8px; border:1px solid rgba(98, 217, 255, .4); background:rgba(8,14,25,.45); min-height:42px;">Welcome, miner. Connect wallet or tap to begin.</div>
    </section>

    <section class="panel" id="mission-panel" style="display:none;">
      <h3>AI Missions</h3>
      <ul id="mission-list" style="margin:0; padding-left: 14px; list-style: disc;"></ul>
    </section>

    <section class="panel" id="leaderboard" style="display:none;">
      <h3>Leaderboard</h3>
      <ul id="leaderboard-list" style="margin:0; padding-left: 14px; list-style: decimal;"></ul>
    </section>

    <section class="panel" id="marketplace" style="display:none;">
      <h3>Marketplace</h3>
      <ul id="market-list" style="margin:0; padding-left: 14px; list-style: none;"></ul>
    </section>

    <footer class="tiny-footer">@NeuralMiner_bot</footer>
  </div>

  <script src="main.js"></script>
</body>
</html>
